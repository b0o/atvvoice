name: COPR

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.3)"
        required: true
      chroots:
        description: "COPR chroots (space-separated)"
        required: false
        default: "fedora-42-x86_64 fedora-42-aarch64 fedora-43-x86_64 fedora-43-aarch64 fedora-44-x86_64 fedora-44-aarch64"
      dry-run:
        description: "Build SRPM only, don't submit to COPR"
        type: boolean
        default: false

env:
  COPR_OWNER: maddison-io
  COPR_PROJECT: ATVVoice
  DEFAULT_CHROOTS: "fedora-42-x86_64 fedora-42-aarch64 fedora-43-x86_64 fedora-43-aarch64 fedora-44-x86_64 fedora-44-aarch64"

jobs:
  copr:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    steps:
      - name: Install tools
        run: |
          dnf install -y \
            rpm-build \
            rpmdevtools \
            rust \
            cargo \
            gcc \
            git \
            pkgconf-pkg-config \
            pipewire-devel \
            dbus-devel \
            bluez-libs-devel \
            clang-devel \
            python3-pip
          pip3 install copr-cli

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.event.release.tag_name }}
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          TAG="${{ inputs.tag || github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Configure git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build SRPM
        id: srpm
        run: |
          SRPM_PATH="$(packaging/rpm/build-srpm.sh --version "${{ steps.version.outputs.version }}")"
          SRPM_FILE="$(basename "$SRPM_PATH")"
          echo "file=$SRPM_FILE" >> "$GITHUB_OUTPUT"
          echo "Built: $SRPM_FILE"

      - name: Upload SRPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: srpm
          path: "*.src.rpm"

      - name: Submit to COPR
        if: ${{ !(inputs.dry-run || false) }}
        run: |
          # Write COPR credentials
          mkdir -p ~/.config
          printf '[copr-cli]\nlogin = %s\nusername = %s\ntoken = %s\ncopr_url = https://copr.fedorainfracloud.org\n' \
            "${{ secrets.COPR_API_LOGIN }}" \
            "${{ env.COPR_OWNER }}" \
            "${{ secrets.COPR_API_TOKEN }}" \
            > ~/.config/copr

          # Determine chroots
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CHROOTS="${{ inputs.chroots || env.DEFAULT_CHROOTS }}"
          else
            CHROOTS="${{ env.DEFAULT_CHROOTS }}"
          fi

          # Build copr-cli command with --chroot flags
          CMD="copr-cli build"
          IFS=' ' read -ra CHROOT_ARRAY <<< "$CHROOTS"
          for chroot in "${CHROOT_ARRAY[@]}"; do
            CMD="$CMD --chroot $chroot"
          done
          CMD="$CMD ${{ env.COPR_OWNER }}/${{ env.COPR_PROJECT }} ${{ steps.srpm.outputs.file }}"

          echo "Submitting to COPR: $CMD"
          eval "$CMD"
