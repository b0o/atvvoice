name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true
      dry-run:
        description: "Build only, skip creating a release"
        type: boolean
        default: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: atvvoice-x86_64-linux
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            artifact: atvvoice-aarch64-linux
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libdbus-1-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - name: Install packaging tools
        run: cargo install cargo-deb cargo-generate-rpm

      - name: Build
        run: cargo build --release --locked

      - name: Build .deb package
        run: cargo deb --no-build

      - name: Build .rpm package
        run: cargo generate-rpm

      - name: Package artifacts
        run: |
          cp target/release/atvvoice ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}
          cp target/debian/*.deb .
          cp target/generate-rpm/*.rpm .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            *.deb
            *.rpm

  release:
    needs: build
    if: ${{ !(inputs.dry-run || false) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            atvvoice-x86_64-linux
            atvvoice-aarch64-linux
            *.deb
            *.rpm

  copr:
    needs: release
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    steps:
      - name: Install tools
        run: |
          dnf install -y \
            rpm-build \
            rpmdevtools \
            rust \
            cargo \
            gcc \
            git \
            pkgconf-pkg-config \
            pipewire-devel \
            dbus-devel \
            bluez-libs-devel \
            clang-devel \
            python3-pip
          pip3 install copr-cli

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          VERSION="${{ steps.tag.outputs.tag }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Configure git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build SRPM
        id: srpm
        run: |
          SRPM_PATH="$(packaging/rpm/build-srpm.sh --version "${{ steps.version.outputs.version }}")"
          SRPM_FILE="$(basename "$SRPM_PATH")"
          echo "file=$SRPM_FILE" >> "$GITHUB_OUTPUT"
          echo "Built: $SRPM_FILE"

      - name: Upload SRPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: srpm
          path: "*.src.rpm"

      - name: Submit to COPR
        run: |
          mkdir -p ~/.config
          printf '[copr-cli]\nlogin = %s\nusername = %s\ntoken = %s\ncopr_url = https://copr.fedorainfracloud.org\n' \
            "${{ secrets.COPR_API_LOGIN }}" \
            "maddison-io" \
            "${{ secrets.COPR_API_TOKEN }}" \
            > ~/.config/copr

          CHROOTS="fedora-42-x86_64 fedora-42-aarch64 fedora-43-x86_64 fedora-43-aarch64 fedora-44-x86_64 fedora-44-aarch64"

          CMD="copr-cli build"
          IFS=' ' read -ra CHROOT_ARRAY <<< "$CHROOTS"
          for chroot in "${CHROOT_ARRAY[@]}"; do
            CMD="$CMD --chroot $chroot"
          done
          CMD="$CMD maddison-io/ATVVoice ${{ steps.srpm.outputs.file }}"

          echo "Submitting to COPR: $CMD"
          eval "$CMD"
