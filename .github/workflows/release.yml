name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true
      dry-run:
        description: "Build only, skip creating a release"
        type: boolean
        default: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-latest
          - system: aarch64-linux
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
      - uses: cachix/cachix-action@v17
        with:
          name: atvvoice
        continue-on-error: true

      - name: Build
        run: nix build .#packages.${{ matrix.system }}.default

      - name: Package artifact
        run: |
          cp result/bin/atvvoice atvvoice-${{ matrix.system }}
          chmod +x atvvoice-${{ matrix.system }}

      - uses: actions/upload-artifact@v4
        with:
          name: atvvoice-${{ matrix.system }}
          path: atvvoice-${{ matrix.system }}

  release:
    needs: build
    if: ${{ !(inputs.dry-run || false) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            atvvoice-x86_64-linux
            atvvoice-aarch64-linux
